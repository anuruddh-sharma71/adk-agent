<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Text Summarizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0f0f13;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
header{text-align:center;margin-bottom:32px;padding-top:20px}
h1{font-size:2rem;font-weight:700;color:#a78bfa;margin-bottom:8px}
.subtitle{color:#8888a0;font-size:0.95rem}
.badge{display:inline-block;background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);color:#a78bfa;padding:5px 14px;border-radius:100px;font-size:12px;margin-bottom:14px}
.container{width:100%;max-width:760px;display:flex;flex-direction:column;gap:18px}
.card{background:#1a1a24;border:1px solid #2e2e3e;border-radius:16px;padding:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#8888a0;display:block;margin-bottom:10px}
textarea{width:100%;background:#22222f;border:1px solid #2e2e3e;border-radius:10px;color:#e8e8f0;font-family:sans-serif;font-size:0.95rem;padding:14px;resize:vertical;min-height:160px;outline:none;line-height:1.6}
textarea:focus{border-color:#7c6af7}
.row{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
select{background:#22222f;border:1px solid #2e2e3e;border-radius:8px;color:#e8e8f0;padding:8px 12px;font-size:0.9rem;outline:none}
.btn{background:#7c6af7;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-left:auto;transition:background 0.2s}
.btn:hover{background:#6a58e0}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.examples{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#22222f;border:1px solid #2e2e3e;border-radius:100px;padding:6px 14px;font-size:12px;color:#8888a0;cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:#7c6af7;color:#a78bfa}
.result{background:#1a1a24;border:1px solid #2e2e3e;border-radius:16px;padding:24px;display:none}
.result-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.result-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#34d399}
.copy{background:#22222f;border:1px solid #2e2e3e;border-radius:8px;color:#8888a0;padding:6px 14px;font-size:12px;cursor:pointer;transition:all 0.2s}
.copy:hover{color:#e8e8f0}
.result-text{font-size:0.95rem;line-height:1.75;white-space:pre-wrap}
.result-text b{color:#a78bfa}
.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px;color:#f87171;font-size:0.9rem;display:none}
.loader{display:none;text-align:center;padding:20px;color:#8888a0}
.dot-anim::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:'.'}50%{content:'..'}100%{content:'...'}}
footer{margin-top:32px;color:#555;font-size:12px;text-align:center}
footer a{color:#7c6af7;text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="badge">⚡ Gemini 2.0 Flash + Google ADK</div>
  <h1>AI Text Summarizer Agent</h1>
  <p class="subtitle">Paste any text and get an instant AI-powered summary</p>
</header>

<div class="container">
  <div class="card">
    <label>Input Text</label>
    <textarea id="txt" placeholder="Paste your article, news, paragraph or any text here..."></textarea>
    <div style="margin-top:14px">
      <label>Try an example</label>
      <div class="examples">
        <div class="chip" onclick="ex(0)">🌍 Climate Change</div>
        <div class="chip" onclick="ex(1)">🤖 Artificial Intelligence</div>
        <div class="chip" onclick="ex(2)">🚀 Space Exploration</div>
        <div class="chip" onclick="ex(3)">💊 Healthcare</div>
      </div>
    </div>
    <div class="row">
      <label style="margin:0">Length:</label>
      <select id="len">
        <option value="2">2 sentences</option>
        <option value="3" selected>3 sentences</option>
        <option value="5">5 sentences</option>
      </select>
      <button class="btn" id="btn" onclick="go()">Summarize →</button>
    </div>
  </div>

  <div class="error" id="err"></div>
  <div class="loader" id="loader"><span class="dot-anim">Summarizing</span></div>

  <div class="result" id="res">
    <div class="result-top">
      <div class="result-label">✦ Summary</div>
      <button class="copy" onclick="cp()">Copy</button>
    </div>
    <div class="result-text" id="out"></div>
  </div>
</div>

<footer>Built with <a href="https://google.github.io/adk-docs/">Google ADK</a> · <a href="https://deepmind.google/technologies/gemini/">Gemini 2.0 Flash</a> · Deployed on <a href="https://render.com">Render</a></footer>

<script>
const samples=[
  "Climate change is one of the most pressing challenges facing humanity today. Rising global temperatures caused by greenhouse gas emissions are leading to more frequent and severe weather events, rising sea levels, and disruptions to ecosystems worldwide. Scientists warn that without significant reductions in carbon emissions, the planet could warm by more than 2 degrees Celsius above pre-industrial levels.",
  "Artificial intelligence is transforming industries worldwide. From healthcare to finance, AI systems are being deployed to automate decisions, detect fraud, and accelerate drug discovery. Large language models can now write code, generate images, and hold complex conversations. Despite its promise, AI also raises concerns about job displacement and algorithmic bias.",
  "Space exploration has entered a new era with the rise of commercial spaceflight companies. SpaceX, Blue Origin, and Virgin Galactic are competing to make space more accessible, while NASA plans to return humans to the Moon through the Artemis program. Scientists are also searching for signs of life on Mars and studying the icy moons of Jupiter and Saturn.",
  "Modern healthcare is being revolutionized by advances in genomics, precision medicine, and digital health technologies. Wearable devices can now monitor heart rhythms and blood oxygen levels. CRISPR gene editing holds promise for curing genetic disorders, while mRNA vaccine technology is being applied to cancer treatment and other diseases."
];

function ex(i){ document.getElementById('txt').value=samples[i]; }

async function go(){
  const text=document.getElementById('txt').value.trim();
  const len=document.getElementById('len').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const res=document.getElementById('res');
  const loader=document.getElementById('loader');

  if(!text){err.textContent='Please enter some text first.';err.style.display='block';return;}
  err.style.display='none';
  res.style.display='none';
  loader.style.display='block';
  btn.disabled=true;
  btn.textContent='Summarizing...';

  try{
    const r=await fetch('/run',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:`Summarize this in ${len} sentences:\n\n${text}`})
    });
    if(!r.ok) throw new Error(`Server error ${r.status}`);
    const data=await r.json();
    const formatted=data.response.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
    document.getElementById('out').innerHTML=formatted;
    res.style.display='block';
  }catch(e){
    err.textContent='Error: '+e.message;
    err.style.display='block';
  }finally{
    loader.style.display='none';
    btn.disabled=false;
    btn.textContent='Summarize →';
  }
}

function cp(){
  navigator.clipboard.writeText(document.getElementById('out').innerText);
  document.querySelector('.copy').textContent='Copied!';
  setTimeout(()=>document.querySelector('.copy').textContent='Copy',2000);
}

document.getElementById('txt').addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='Enter') go();
});
</script>
</body>
</html>
