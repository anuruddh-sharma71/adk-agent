<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Summarizer Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--sidebar:#0d0d14;--surface:#13131e;--surface2:#1a1a28;--border:#1e1e2e;--border2:#252535;--accent:#00d4b4;--accent2:#00b89a;--text:#f0f0f8;--muted:#6b6b85;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden}
.sidebar{width:64px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:8px;flex-shrink:0;z-index:10}
.logo{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;cursor:pointer}
.nav-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.2s;border:none;background:transparent}
.nav-btn:hover,.nav-btn.active{background:var(--surface2);color:var(--text)}
.nav-btn.active{color:var(--accent)}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.topbar{display:flex;align-items:center;justify-content:flex-end;padding:16px 28px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:100px;padding:6px 14px 6px 8px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.user-name{font-size:13px;font-weight:500}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 28px 0;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.orb-wrap{position:relative;width:220px;height:180px;margin-bottom:-10px;flex-shrink:0}
.orb{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(0,212,180,0.25) 0%,rgba(0,150,130,0.15) 30%,rgba(10,10,30,0.9) 70%,rgba(5,5,20,1) 100%);border:1px solid rgba(0,212,180,0.2);position:absolute;top:0;left:10px;box-shadow:0 0 60px rgba(0,212,180,0.08),inset 0 0 40px rgba(0,212,180,0.05);animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.greeting{text-align:left;width:100%;max-width:780px;margin-bottom:24px;position:relative;z-index:1}
.greeting h1{font-size:2.6rem;font-weight:700;line-height:1.2;letter-spacing:-0.5px}
.greeting h1 span{color:var(--accent)}
.cards{display:flex;gap:16px;width:100%;max-width:780px;margin-bottom:24px;position:relative;z-index:1}
.card{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;min-height:90px}
.card::before{content:'';position:absolute;inset:0;opacity:0.12;border-radius:16px}
.card.blue::before{background:linear-gradient(135deg,#667eea,#764ba2)}
.card.pink::before{background:linear-gradient(135deg,#f093fb,#f5576c)}
.card.green::before{background:linear-gradient(135deg,#00d4b4,#0097a7)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.card-tag{display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-bottom:10px}
.card.blue .card-tag{background:rgba(167,139,250,0.2);color:#c4b5fd}
.card.pink .card-tag{background:rgba(255,143,163,0.2);color:#ffb3c6}
.card.green .card-tag{background:rgba(0,212,180,0.2);color:#00d4b4}
.card p{font-size:12px;color:var(--muted);line-height:1.5}
.input-wrap{width:100%;max-width:780px;position:relative;z-index:1;margin-bottom:20px}
.input-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:20px 20px 14px;transition:border-color 0.2s}
.input-box:focus-within{border-color:rgba(0,212,180,0.4)}
.sparkle{font-size:18px;margin-bottom:10px;display:block}
textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:0.95rem;resize:none;min-height:60px;max-height:160px;line-height:1.6;overflow-y:auto}
textarea::placeholder{color:var(--muted)}
.input-bottom{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.attach-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.attach-btn:hover{color:var(--text);border-color:var(--accent)}
.len-select{background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;outline:none;font-family:'Inter',sans-serif}
.send-btn{width:42px;height:42px;background:var(--accent);border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{background:var(--accent2);transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{color:#000}
.chat-area{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.msg{display:flex;gap:12px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px}
.msg.agent .msg-avatar{background:var(--accent);color:#000}
.msg.user .msg-avatar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bubble{max-width:72%;padding:14px 16px;border-radius:16px;font-size:0.9rem;line-height:1.7}
.msg.agent .bubble{background:var(--surface);border:1px solid var(--border2);border-top-left-radius:4px}
.msg.user .bubble{background:rgba(0,212,180,0.12);border:1px solid rgba(0,212,180,0.2);border-top-right-radius:4px}
.bubble b{color:var(--accent);font-weight:600}
.bubble-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.act-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.act-btn:hover{color:var(--text);border-color:var(--accent)}
.typing{display:flex;gap:4px;align-items:center;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:0.4;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-5px);opacity:1}}
.err-msg{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:12px 16px;color:#f87171;font-size:0.88rem}
@media(max-width:640px){.sidebar{width:52px}.cards{flex-direction:column}.greeting h1{font-size:1.8rem}.orb{width:150px;height:150px}}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
  <button class="nav-btn active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
  <button class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></button>
  <button class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21l-8-7-8 7V5a2 2 0 012-2h12a2 2 0 012 2z"/></svg></button>
  <button class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
  <div class="sidebar-bottom">
    <button class="nav-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
    <div class="avatar">A</div>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="user-pill">
      <div class="user-avatar">A</div>
      <span class="user-name">Anuruddh</span>
      <span style="color:var(--muted);font-size:12px">▾</span>
    </div>
  </div>
  <div class="hero" id="heroSection">
    <div class="orb-wrap"><div class="orb"></div></div>
    <div class="greeting">
      <h1>Hey! Anuruddh 👋<br>What can I <span>summarize</span> today?</h1>
    </div>
    <div class="cards">
      <div class="card blue" onclick="usePrompt('Summarize the impact of climate change on global food security and agriculture.')">
        <div class="card-tag">📰 News Article</div>
        <p>Summarize a news article or blog post for me</p>
      </div>
      <div class="card pink" onclick="usePrompt('Summarize this: mRNA vaccines train the immune system by delivering genetic instructions that cause cells to produce a protein, triggering an immune response without using live virus.')">
        <div class="card-tag">🔬 Research</div>
        <p>Summarize a research paper or report</p>
      </div>
      <div class="card green" onclick="usePrompt('Summarize the key benefits and risks of artificial intelligence in healthcare, including diagnosis, drug discovery, and patient monitoring.')">
        <div class="card-tag">⚡ Quick Summary</div>
        <p>Get a quick summary of any topic</p>
      </div>
    </div>
    <div class="input-wrap">
      <div class="input-box">
        <span class="sparkle">✦</span>
        <textarea id="txt" placeholder="Ask me anything or paste text to summarize..." rows="2" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-bottom">
          <button class="attach-btn" onclick="document.getElementById('fi').click()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            Attach file
          </button>
          <input type="file" id="fi" style="display:none" accept=".txt" onchange="handleFile(event)"/>
          <select class="len-select" id="len">
            <option value="2">2 sentences</option>
            <option value="3" selected>3 sentences</option>
            <option value="5">5 sentences</option>
            <option value="7">7 sentences</option>
          </select>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="chat-area" id="chatArea" style="display:none"></div>
  <div style="padding:0 28px 20px;display:none" id="chatInputWrap">
    <div class="input-box">
      <span class="sparkle">✦</span>
      <textarea id="txt2" placeholder="Paste more text to summarize..." rows="2" onkeydown="handleKey2(event)" oninput="autoResize(this)"></textarea>
      <div class="input-bottom">
        <select class="len-select" id="len2">
          <option value="2">2 sentences</option>
          <option value="3" selected>3 sentences</option>
          <option value="5">5 sentences</option>
          <option value="7">7 sentences</option>
        </select>
        <button class="send-btn" id="sendBtn2" onclick="sendMessage2()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<script>
let chatMode=false;
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px'}
function usePrompt(t){document.getElementById('txt').value=t;autoResize(document.getElementById('txt'));document.getElementById('txt').focus()}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function handleKey2(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage2()}}
function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('txt').value=ev.target.result.slice(0,3000);autoResize(document.getElementById('txt'))};r.readAsText(f)}
function switchToChatMode(){if(!chatMode){chatMode=true;document.getElementById('heroSection').style.display='none';document.getElementById('chatArea').style.display='flex';document.getElementById('chatInputWrap').style.display='block'}}
function addMessage(role,content){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');div.className='msg '+role;
  const av=document.createElement('div');av.className='msg-avatar';av.textContent=role==='agent'?'✦':'A';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(role==='agent'){
    bubble.innerHTML=content.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    const acts=document.createElement('div');acts.className='bubble-actions';
    acts.innerHTML='<button class="act-btn" onclick="copyText(this,`'+encodeURIComponent(content)+'`)">📋 Copy</button><button class="act-btn" onclick="newSummary()">🔄 New Summary</button>';
    bubble.appendChild(acts);
  }else{bubble.textContent=content}
  div.appendChild(av);div.appendChild(bubble);area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function addTyping(){const area=document.getElementById('chatArea');const div=document.createElement('div');div.className='msg agent';div.id='typingMsg';div.innerHTML='<div class="msg-avatar">✦</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';area.appendChild(div);area.scrollTop=area.scrollHeight}
function removeTyping(){const t=document.getElementById('typingMsg');if(t)t.remove()}
function copyText(btn,enc){navigator.clipboard.writeText(decodeURIComponent(enc));btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000)}
function newSummary(){chatMode=false;document.getElementById('heroSection').style.display='flex';document.getElementById('chatArea').style.display='none';document.getElementById('chatInputWrap').style.display='none';document.getElementById('chatArea').innerHTML='';document.getElementById('txt').value='';document.getElementById('txt').focus()}
async function doSend(text,len,btn){
  switchToChatMode();addMessage('user',text);addTyping();btn.disabled=true;
  try{
    const r=await fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Summarize this in '+len+' sentences:\n\n'+text})});
    removeTyping();
    if(!r.ok)throw new Error('Server error '+r.status);
    const data=await r.json();addMessage('agent',data.response);
  }catch(e){
    removeTyping();
    const area=document.getElementById('chatArea');
    const err=document.createElement('div');err.className='err-msg';err.textContent='Error: '+e.message;area.appendChild(err);area.scrollTop=area.scrollHeight;
  }finally{btn.disabled=false}
}
function sendMessage(){const t=document.getElementById('txt').value.trim();if(!t)return;document.getElementById('txt').value='';doSend(t,document.getElementById('len').value,document.getElementById('sendBtn'))}
function sendMessage2(){const t=document.getElementById('txt2').value.trim();if(!t)return;document.getElementById('txt2').value='';doSend(t,document.getElementById('len2').value,document.getElementById('sendBtn2'))}
</script>
</body>
</html>
